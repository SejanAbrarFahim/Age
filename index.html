<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/img/ChatGPT Image Mar 13, 2026, 03_57_40 PM.png" type="image/x-icon">
    <link rel="stylesheet" href="dist/styles.css">
    <title>Your Age</title>
</head>
  <body class="min-h-screen flex items-center justify-center 
bg-gradient-to-br from-purple-200 via-blue-200  to-teal-200">
    <section class="w-[80%] lg:w-[65%] xl:w-[55%] 2xl:w-[45%] mx-auto bg-white rounded-xl shadow-2xl shadow-blue-300">
       <div class="text-center my-10">
        <h2 class="text-3xl lg:text-5xl font-semibold text-gray-700 mb-3">Birth Date Calculator</h2> 
        <h4 class="text-gray-400 texl-xs lg:text-xl mx-5">Enter your birth date to calculate your age.</h4>
       </div>
       <div class=" md:flex justify-between items-center mx-4 lg:mx-10 xl:mx-20 gap-1">
          <div class="flex flex-col  justify-center pb-5">
            <label for="date" class="label">Date</label>
            <input type="text" name="Date" id="date" placeholder="dd" required="required" minlength="1" maxlength="2" class="input">
          </div>
          <div class="flex flex-col justify-center pb-5">
            <label for="month" class="label">Month</label>
            <input type="text" name="month" id="month" placeholder="mm" required="required" minlength="1" maxlength="2" class="input">
          </div>
          <div class="flex flex-col justify-center pb-5">
            <label for="year" class="label">Year</label>
            <input type="text" name="year" id="year" placeholder="yy" required="required" minlength="4" maxlength="4" class="input">
          </div>
       </div>
        
       <div class="flex justify-center items-center">
        <button type="submit" onclick="age()"  class="border text-white bg-blue-400 shadow-blue-400 shadow-2xl border-blue-200 rounded-full px-5 py-1 text-xl my-5 cursor-pointer transition-all duration-300 hover:bg-blue-500 hover:text-amber-200 hover:scale-105">Calculator</button>
       </div>
       <div id="age" class="text-center text-xl mb-6 mx-5 "></div>
    </section>
  </body>

  <script src="Script.js"></script>
 
</html>
